name: Build Blazor WebAssembly

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Build Project
        run: dotnet publish MiniGameCollection.Web -c Release -o output
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-build
          path: output/wwwroot
          retention-days: 7
