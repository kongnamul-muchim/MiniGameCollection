<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniGameCollection.Web</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/game-grid.css" />
    <link rel="stylesheet" href="css/games.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MiniGameCollection.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Handle SPA redirect from 404.html
        const redirectPath = sessionStorage.getItem('blazor-spa-redirect');
        if (redirectPath) {
            sessionStorage.removeItem('blazor-spa-redirect');
            // Navigate to the correct route after Blazor loads
            window.addEventListener('load', function() {
                history.replaceState(null, '', redirectPath);
            });
        }
    </script>
</body>

</html>
